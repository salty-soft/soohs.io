<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求人票一覧 2025</title>
<style>
  :root {
    --green:  #1a4731;
    --gold:   #b8972a;
    --cream:  #f7f4ed;
    --white:  #ffffff;
    --gray1:  #f0ede6;
    --gray2:  #d6d0c4;
    --gray3:  #888070;
    --text:   #1e1a14;
    --shadow: 0 2px 12px rgba(0,0,0,.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--green);
    color: #fff;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  header .logo {
    width: 42px; height: 42px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 18px; color: var(--green); flex-shrink: 0;
  }
  header .title-block h1 { font-size: 18px; font-weight: 700; letter-spacing: .05em; }
  header .title-block p  { font-size: 11px; color: rgba(255,255,255,.65); margin-top: 2px; }
  header .count-badge {
    margin-left: auto;
    background: var(--gold);
    color: var(--green);
    font-weight: 700;
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* ── CONTROLS ── */
  .controls {
    padding: 14px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    background: var(--white);
    border-bottom: 2px solid var(--gold);
  }
  .controls input[type="text"] {
    flex: 1 1 200px;
    padding: 8px 12px;
    border: 1.5px solid var(--gray2);
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
    background: var(--cream);
  }
  .controls input[type="text"]:focus { border-color: var(--gold); }
  .controls select {
    padding: 8px 10px;
    border: 1.5px solid var(--gray2);
    border-radius: 6px;
    font-size: 14px;
    background: var(--cream);
    cursor: pointer;
    outline: none;
  }
  .controls select:focus { border-color: var(--gold); }
  .controls label { font-size: 13px; color: var(--gray3); white-space: nowrap; }

  /* ── FILE LOAD ── */
  .file-load {
    padding: 10px 20px;
    background: var(--gray1);
    border-bottom: 1px solid var(--gray2);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--gray3);
    flex-wrap: wrap;
  }
  .file-load input[type="file"] { font-size: 13px; }
  #file-status { font-weight: 600; color: var(--green); }

  /* ── TABLE WRAP ── */
  .table-wrap {
    overflow-x: auto;
    padding: 16px 20px 40px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: var(--white);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  thead tr {
    background: var(--green);
    color: #fff;
  }
  thead th {
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    white-space: nowrap;
    letter-spacing: .03em;
    cursor: pointer;
    user-select: none;
    position: relative;
  }
  thead th:hover { background: #265c3f; }
  thead th .sort-icon { margin-left: 4px; opacity: .5; font-size: 10px; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--gold); }

  tbody tr { border-bottom: 1px solid var(--gray1); transition: background .15s; }
  tbody tr:hover { background: #f0ede6; }
  tbody td { padding: 9px 12px; vertical-align: top; }

  /* column widths */
  .col-num   { width: 36px; color: var(--gray3); font-size: 11px; text-align: center; }
  .col-id    { white-space: nowrap; font-family: monospace; font-size: 11px; color: var(--gray3); }
  .col-name  { min-width: 160px; font-weight: 600; }
  .col-job   { min-width: 130px; }
  .col-addr  { min-width: 130px; font-size: 12px; }
  .col-sal   { text-align: right; white-space: nowrap; font-weight: 600; color: var(--green); }
  .col-hol   { text-align: right; white-space: nowrap; }
  .col-cat   { min-width: 100px; }
  .col-tour  { text-align: center; }
  .col-bon   { text-align: center; }
  .col-detail{ text-align: center; }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    background: #e8f0eb;
    color: var(--green);
    white-space: nowrap;
  }
  .tag.gold  { background: #f5edcc; color: #7a5e10; }
  .tag.gray  { background: var(--gray1); color: var(--gray3); }
  .tag.yes   { background: #dff0e3; color: #1a6b35; }
  .tag.no    { background: #f5e0e0; color: #8b2020; }

  /* detail panel */
  .btn-detail {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-detail:hover { background: var(--gold); }

  /* MODAL */
  #modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #modal-bg.open { display: flex; }
  #modal {
    background: var(--white);
    border-radius: 12px;
    max-width: 680px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,.3);
  }
  #modal-header {
    background: var(--green);
    color: #fff;
    padding: 16px 20px;
    border-radius: 12px 12px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  #modal-header h2 { font-size: 16px; font-weight: 700; }
  #modal-header .job-title { font-size: 13px; color: rgba(255,255,255,.75); margin-top: 3px; }
  #modal-close {
    background: none; border: none; color: #fff;
    font-size: 22px; cursor: pointer; line-height: 1; flex-shrink: 0;
  }
  #modal-body { padding: 18px 20px; }
  .modal-section { margin-bottom: 16px; }
  .modal-section h3 {
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 6px;
    border-bottom: 1px solid var(--gray1);
    padding-bottom: 4px;
  }
  .modal-section p {
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text);
  }
  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .modal-item { font-size: 13px; }
  .modal-item .label { font-size: 11px; color: var(--gray3); margin-bottom: 1px; }
  .modal-item .value { font-weight: 600; }
  .modal-item .value.salary { color: var(--green); font-size: 15px; }

  /* empty / loading */
  #loading, #empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray3);
    font-size: 15px;
  }
  #loading .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid var(--gray2);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* footer */
  footer {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: var(--gray3);
    border-top: 1px solid var(--gray2);
  }
</style>
</head>
<body>

<header>
  <div class="logo">曽</div>
  <div class="title-block">
    <h1>求人票一覧 2025</h1>
    <p>鹿児島県立曽於高等学校</p>
  </div>
  <div class="count-badge" id="header-count">読込中…</div>
</header>

<div class="file-load">
  <span>📂 CSVファイル：</span>
  <input type="file" id="csv-file" accept="https://soo-hs.github.io/soohs/kyujin/kyujin_test.csv">
  <span id="file-status">ファイルを選択してください</span>
</div>

<div class="controls">
  <label>🔍</label>
  <input type="text" id="search" placeholder="会社名・職種・住所などで絞り込み…">
  <label>分類</label>
  <select id="filter-cat">
    <option value="">すべて</option>
  </select>
  <label>住所</label>
  <select id="filter-addr">
    <option value="">すべて</option>
  </select>
  <label>職場見学</label>
  <select id="filter-tour">
    <option value="">すべて</option>
    <option value="可">可</option>
    <option value="不可">不可</option>
  </select>
</div>

<div class="table-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <div>CSVファイルを選択してください</div>
  </div>
  <div id="empty" style="display:none">該当する求人が見つかりませんでした。</div>
  <table id="table" style="display:none">
    <thead>
      <tr>
        <th class="col-num">#</th>
        <th class="col-id"    data-key="求人番号">求人番号 <span class="sort-icon">▲</span></th>
        <th class="col-name"  data-key="事業所名">事業所名 <span class="sort-icon">▲</span></th>
        <th class="col-job"   data-key="職種">職種 <span class="sort-icon">▲</span></th>
        <th class="col-addr"  data-key="就業場所住所（市区町村）">就業場所 <span class="sort-icon">▲</span></th>
        <th class="col-sal"   data-key="月給（基本給+手当+残業代）">月給 <span class="sort-icon">▲</span></th>
        <th class="col-hol"   data-key="年間休日数">年間休日 <span class="sort-icon">▲</span></th>
        <th class="col-cat">分類</th>
        <th class="col-bon">賞与</th>
        <th class="col-tour">職場見学</th>
        <th class="col-detail">詳細</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<footer>曽於高等学校 進路指導部 ／ データ：ハローワーク大隅 2025年度</footer>

<!-- MODAL -->
<div id="modal-bg">
  <div id="modal">
    <div id="modal-header">
      <div>
        <h2 id="modal-company"></h2>
        <div class="job-title" id="modal-jobtitle"></div>
      </div>
      <button id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
(function(){
  let allData = [];
  let sortKey = '';
  let sortAsc = true;

  // ── CSV パーサー（ダブルクォート・改行対応）──
  function parseCSV(text) {
    // BOM除去
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
    const lines = [];
    let cur = '', inQ = false, row = [];
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQ) {
        if (c === '"' && text[i+1] === '"') { cur += '"'; i++; }
        else if (c === '"') inQ = false;
        else cur += c;
      } else {
        if (c === '"') inQ = true;
        else if (c === ',') { row.push(cur); cur = ''; }
        else if (c === '\n') { row.push(cur); cur = ''; lines.push(row); row = []; }
        else if (c === '\r') { /* skip */ }
        else cur += c;
      }
    }
    if (cur || row.length) { row.push(cur); lines.push(row); }
    const headers = lines[0];
    return lines.slice(1)
      .filter(r => r.some(c => c.trim()))
      .map(r => {
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (r[i] || '').trim());
        return obj;
      });
  }

  // ── ファイル読み込み ──
  document.getElementById('csv-file').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      allData = parseCSV(ev.target.result);
      document.getElementById('file-status').textContent = `✅ ${file.name}（${allData.length}件）`;
      initFilters();
      render();
    };
    reader.readAsText(file, 'UTF-8');
  });

  // ── フィルター初期化 ──
  function initFilters() {
    const cats = [...new Set(allData.map(r => r['職業分類（handy）大分類']).filter(Boolean))].sort();
    const addrs = [...new Set(allData.map(r => r['就業場所住所（市区町村）']).filter(Boolean))].sort();
    const fc = document.getElementById('filter-cat');
    fc.innerHTML = '<option value="">すべて</option>';
    cats.forEach(c => fc.innerHTML += `<option value="${esc(c)}">${esc(c)}</option>`);
    const fa = document.getElementById('filter-addr');
    fa.innerHTML = '<option value="">すべて</option>';
    addrs.forEach(a => fa.innerHTML += `<option value="${esc(a)}">${esc(a)}</option>`);
  }

  // ── フィルタ＆ソート処理 ──
  function filtered() {
    const q = document.getElementById('search').value.toLowerCase();
    const cat = document.getElementById('filter-cat').value;
    const addr = document.getElementById('filter-addr').value;
    const tour = document.getElementById('filter-tour').value;

    let data = allData.filter(r => {
      if (q && !JSON.stringify(Object.values(r)).toLowerCase().includes(q)) return false;
      if (cat  && r['職業分類（handy）大分類'] !== cat) return false;
      if (addr && r['就業場所住所（市区町村）'] !== addr) return false;
      if (tour && r['職場見学の受け入れ'] !== tour) return false;
      return true;
    });

    if (sortKey) {
      data = data.sort((a, b) => {
        let va = a[sortKey] || '', vb = b[sortKey] || '';
        const na = parseFloat(va.replace(/,/g,'')), nb = parseFloat(vb.replace(/,/g,''));
        if (!isNaN(na) && !isNaN(nb)) return sortAsc ? na - nb : nb - na;
        return sortAsc ? va.localeCompare(vb,'ja') : vb.localeCompare(va,'ja');
      });
    }
    return data;
  }

  // ── テーブル描画 ──
  function render() {
    const data = filtered();
    const tbody = document.getElementById('tbody');
    const table = document.getElementById('table');
    const empty = document.getElementById('empty');
    const loading = document.getElementById('loading');
    loading.style.display = 'none';

    document.getElementById('header-count').textContent = `${data.length} 件`;

    if (data.length === 0) {
      table.style.display = 'none';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    table.style.display = 'table';

    tbody.innerHTML = data.map((r, i) => {
      const sal = parseInt(r['月給（基本給+手当+残業代）'] || 0);
      const salStr = sal ? `¥${sal.toLocaleString()}` : '—';
      const hol = r['年間休日数'] || '—';
      const bon = r['賞与有無（新卒）'];
      const tour = r['職場見学の受け入れ'];
      const cat = r['職業分類（handy）大分類'] || '—';
      return `
      <tr>
        <td class="col-num">${i+1}</td>
        <td class="col-id">${esc(r['求人番号'])}</td>
        <td class="col-name">${esc(r['事業所名'])}</td>
        <td class="col-job">${esc(r['職種'])}</td>
        <td class="col-addr">${esc(r['就業場所住所（市区町村）'])}</td>
        <td class="col-sal">${esc(salStr)}</td>
        <td class="col-hol">${esc(hol)}日</td>
        <td class="col-cat"><span class="tag">${esc(cat)}</span></td>
        <td class="col-bon"><span class="tag ${bon==='あり'?'yes':'gray'}">${esc(bon||'—')}</span></td>
        <td class="col-tour"><span class="tag ${tour==='可'?'yes':'gray'}">${esc(tour||'—')}</span></td>
        <td class="col-detail"><button class="btn-detail" data-idx="${i}">詳細</button></td>
      </tr>`;
    }).join('');

    // 詳細ボタンのイベント
    tbody.querySelectorAll('.btn-detail').forEach(btn => {
      btn.addEventListener('click', () => openModal(data[+btn.dataset.idx]));
    });
  }

  // ── ソートヘッダー ──
  document.querySelectorAll('thead th[data-key]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (sortKey === key) sortAsc = !sortAsc;
      else { sortKey = key; sortAsc = true; }
      document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
      th.classList.add('sorted');
      th.querySelector('.sort-icon').textContent = sortAsc ? '▲' : '▼';
      render();
    });
  });

  // ── フィルタイベント ──
  ['search','filter-cat','filter-addr','filter-tour'].forEach(id => {
    document.getElementById(id).addEventListener('input', render);
    document.getElementById(id).addEventListener('change', render);
  });

  // ── モーダル ──
  function openModal(r) {
    const sal = parseInt(r['月給（基本給+手当+残業代）'] || 0);
    document.getElementById('modal-company').textContent = r['事業所名'];
    document.getElementById('modal-jobtitle').textContent = r['職種'];
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-section">
        <h3>基本情報</h3>
        <div class="modal-grid">
          <div class="modal-item"><div class="label">求人番号</div><div class="value">${esc(r['求人番号'])}</div></div>
          <div class="modal-item"><div class="label">受付安定所</div><div class="value">${esc(r['受付安定所'])}</div></div>
          <div class="modal-item"><div class="label">雇用形態</div><div class="value">${esc(r['雇用形態'])}</div></div>
          <div class="modal-item"><div class="label">事業内容</div><div class="value">${esc(r['事業内容'])}</div></div>
          <div class="modal-item"><div class="label">就業場所</div><div class="value">${esc(r['就業場所住所（市区町村）'])}</div></div>
          <div class="modal-item"><div class="label">住所（所在地）</div><div class="value">${esc(r['住所（所在地）'])}</div></div>
          <div class="modal-item"><div class="label">従業員数（企業全体）</div><div class="value">${esc(r['従業員数（企業全体）'])}名</div></div>
          <div class="modal-item"><div class="label">資本金</div><div class="value">${esc(r['資本金'])}</div></div>
        </div>
      </div>
      <div class="modal-section">
        <h3>待遇・給与</h3>
        <div class="modal-grid">
          <div class="modal-item"><div class="label">月給</div><div class="value salary">¥${sal?sal.toLocaleString():'—'}</div></div>
          <div class="modal-item"><div class="label">賞与（新卒）</div><div class="value">${esc(r['賞与有無（新卒）'])}</div></div>
          <div class="modal-item"><div class="label">休日等</div><div class="value">${esc(r['休日等'])}</div></div>
          <div class="modal-item"><div class="label">年間休日数</div><div class="value">${esc(r['年間休日数'])}日</div></div>
          <div class="modal-item"><div class="label">転勤の可能性</div><div class="value">${esc(r['転勤の可能性'])}</div></div>
          <div class="modal-item"><div class="label">入居可能住宅（単身）</div><div class="value">${esc(r['入居可能住宅（単身用）'])}</div></div>
          <div class="modal-item"><div class="label">職場見学</div><div class="value">${esc(r['職場見学の受け入れ'])}</div></div>
          <div class="modal-item"><div class="label">求人数（通勤）</div><div class="value">${esc(r['求人数（通勤）'])}名</div></div>
        </div>
      </div>
      <div class="modal-section">
        <h3>仕事の内容</h3>
        <p>${esc(r['仕事の内容'])}</p>
      </div>
      ${r['必要な知識・技能等'] ? `<div class="modal-section"><h3>必要な知識・技能等</h3><p>${esc(r['必要な知識・技能等'])}</p></div>` : ''}
      ${r['補足事項'] ? `<div class="modal-section"><h3>補足事項</h3><p>${esc(r['補足事項'])}</p></div>` : ''}
      ${r['特記事項'] ? `<div class="modal-section"><h3>特記事項</h3><p>${esc(r['特記事項'])}</p></div>` : ''}
    `;
    document.getElementById('modal-bg').classList.add('open');
  }

  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('modal-bg').classList.remove('open');
  });
  document.getElementById('modal-bg').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-bg'))
      document.getElementById('modal-bg').classList.remove('open');
  });

  // ── ユーティリティ ──
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>
</body>
</html>
