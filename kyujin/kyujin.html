<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曽於高等学校 受付求人票 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --bg2: #111318;
  --bg3: #1a1e28;
  --surface: #1e2330;
  --surface2: #252b3a;
  --border: #2e3548;
  --border2: #3d4560;
  --accent: #00d4ff;
  --accent2: #0099cc;
  --accent3: #00ff9d;
  --gold: #ffd700;
  --text: #e8eaf2;
  --text2: #9aa3b8;
  --text3: #6b7591;
  --green: #00e676;
  --green-bg: rgba(0, 230, 118, 0.1);
  --red: #ff4757;
  --red-bg: rgba(255, 71, 87, 0.1);
  --blue: #448aff;
  --blue-bg: rgba(68, 138, 255, 0.1);
  --orange: #ff9100;
  --header-h: 60px;
  --search-h: 0px;
  --col-h: 44px;
  --footer-h: 52px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  overflow-x: hidden;
}

/* HEADER */
#app-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: linear-gradient(135deg, #0d1117 0%, #1a2035 100%);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  z-index: 1000;
  box-shadow: 0 2px 20px rgba(0, 212, 255, 0.08);
}

#app-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent3) 50%, var(--accent) 100%);
}

.header-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--accent);
  opacity: 0.7;
  white-space: nowrap;
}

.header-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 2px;
  white-space: nowrap;
}

.header-title span {
  color: var(--accent);
}

.header-divider {
  width: 1px;
  height: 28px;
  background: var(--border2);
  flex-shrink: 0;
}

.total-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 4px 12px;
  white-space: nowrap;
}
.total-badge .label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
}
.total-badge .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
}
.total-badge .unit {
  font-size: 10px;
  color: var(--text3);
}

.header-spacer { flex: 1; }

/* CSV LOAD BTN */
#csv-load-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--accent3) 0%, #00aa66 100%);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 8px 18px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  box-shadow: 0 0 16px rgba(0, 255, 157, 0.3);
  white-space: nowrap;
  flex-shrink: 0;
}
#csv-load-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 24px rgba(0, 255, 157, 0.5);
}

/* CSV LOAD OVERLAY */
#csv-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
#csv-overlay.hidden { display: none; }
#csv-drop-zone {
  background: var(--surface);
  border: 2px dashed var(--accent3);
  border-radius: 16px;
  padding: 48px 64px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 380px;
}
#csv-drop-zone.drag-over {
  border-color: var(--accent);
  background: var(--surface2);
  box-shadow: 0 0 40px rgba(0,212,255,0.2);
}
#csv-drop-zone h2 {
  color: var(--accent3);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: 2px;
}
#csv-drop-zone p {
  color: var(--text2);
  font-size: 13px;
  margin-bottom: 24px;
  line-height: 1.8;
}
#csv-drop-zone .drop-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.8;
}
#csv-drop-zone .btn-pick {
  background: var(--accent3);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 10px 28px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
#csv-drop-zone .btn-pick:hover {
  background: #00cc7a;
  transform: translateY(-1px);
}
#csv-hint {
  margin-top: 16px;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.5px;
}
#csv-skip-btn {
  display: block;
  margin: 20px auto 0;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text3);
  border-radius: 6px;
  padding: 6px 20px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}
#csv-skip-btn:hover {
  border-color: var(--text3);
  color: var(--text);
}

/* SEARCH TOGGLE BTN */
#search-toggle-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, #0077aa 100%);
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 8px 18px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  box-shadow: 0 0 16px rgba(0, 212, 255, 0.4);
  white-space: nowrap;
  flex-shrink: 0;
}
#search-toggle-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 24px rgba(0, 212, 255, 0.6);
}
#search-toggle-btn svg {
  width: 14px; height: 14px;
  transition: transform 0.3s;
}
#search-toggle-btn.active {
  background: linear-gradient(135deg, var(--accent3) 0%, #00aa66 100%);
}
#search-toggle-btn.active svg {
  transform: rotate(180deg);
}

/* SEARCH PANEL */
#search-panel {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border2);
  z-index: 990;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s;
  padding: 0 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
#search-panel.open {
  max-height: 280px;
  padding: 16px 20px;
}

.search-grid {
  display: grid;
  grid-template-columns: 160px 1fr 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.search-grid2 {
  display: grid;
  grid-template-columns: 200px 200px 1fr 1fr auto;
  gap: 12px;
  align-items: end;
}

.field-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.field-group label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
  font-weight: 500;
  text-transform: uppercase;
}
.field-group input,
.field-group select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 7px 10px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.field-group input:focus,
.field-group select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.1);
}
.field-group select option {
  background: var(--surface);
}

.range-group {
  display: flex;
  gap: 6px;
  align-items: center;
}
.range-group input {
  width: 80px;
}
.range-sep {
  color: var(--text3);
  font-size: 11px;
}

.search-actions {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.btn-search {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 6px;
  padding: 7px 20px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-search:hover {
  background: #00aacc;
}
.btn-reset {
  background: transparent;
  color: var(--text3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 16px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-reset:hover {
  border-color: var(--text3);
  color: var(--text);
}

.search-result-count {
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: 6px;
  padding: 7px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
  white-space: nowrap;
  align-self: flex-end;
}

/* MAIN LAYOUT */
#main {
  padding-top: var(--header-h);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* TABLE CONTAINER */
#table-wrap {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  margin-bottom: var(--footer-h);
}

/* COLUMN HEADERS - fixed */
#col-header-wrap {
  overflow: hidden;
  flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 2px solid var(--accent);
}

#col-header {
  display: flex;
  align-items: stretch;
  min-width: max-content;
}

/* SCROLLABLE BODY */
#table-body-wrap {
  overflow: auto;
  flex: 1;
}

#table-body {
  min-width: max-content;
}

#card-body-wrap {
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

#card-body {
  max-width: 640px;
  margin: 0 auto;
}

/* COLUMN DEFINITIONS */
.col {
  flex-shrink: 0;
  padding: 0 8px;
  display: flex;
  align-items: center;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.col:last-child { border-right: none; }

/* Column widths */
.c-no      { width: 64px; justify-content: center; }
.c-antei   { width: 130px; }
.c-kyunin  { width: 120px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.c-jigsho  { width: 180px; }
.c-syozai  { width: 130px; }
.c-shihon  { width: 110px; }
.c-shainsuu { width: 70px; justify-content: center; }
.c-jgshnin { width: 80px; justify-content: center; }
.c-kyuninsuu { width: 62px; justify-content: center; }
.c-jgsho   { width: 110px; }
.c-salary  { width: 96px; justify-content: flex-end; }
.c-bonus   { width: 68px; justify-content: center; }
.c-overtime { width: 76px; justify-content: center; }
.c-holiday  { width: 80px; justify-content: center; }
.c-nenkyu  { width: 72px; justify-content: center; }
.c-gyoshu  { width: 130px; }
.c-sangyo  { width: 160px; }
.c-shokushu { width: 180px; }

/* HEADER ROW */
.th {
  height: var(--col-h);
  background: var(--bg2);
  color: var(--text3);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  user-select: none;
  position: relative;
  transition: color 0.15s, background 0.15s;
  white-space: nowrap;
}
.th:hover {
  color: var(--accent);
  background: var(--surface);
}
.th.sort-asc, .th.sort-desc {
  color: var(--accent);
}
.th .sort-icon {
  margin-left: 4px;
  font-size: 10px;
  opacity: 0.5;
}
.th.sort-asc .sort-icon::after { content: '▲'; opacity: 1; }
.th.sort-desc .sort-icon::after { content: '▼'; opacity: 1; }
.th .sort-icon::after { content: '⇅'; }

/* Resize handle */
.resize-handle {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 4px;
  cursor: col-resize;
  z-index: 10;
}
.resize-handle:hover, .resize-handle.dragging {
  background: var(--accent);
}

/* DATA ROWS */
.tr {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid var(--border);
  min-height: 40px;
  transition: background 0.1s;
}
.tr:hover {
  background: var(--surface);
}
.tr:nth-child(even) {
  background: rgba(30, 35, 48, 0.5);
}
.tr:nth-child(even):hover {
  background: var(--surface);
}

.td {
  display: flex;
  align-items: center;
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
  min-height: 40px;
}

/* Special cells */
.cell-no {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
}

.cell-jigsho {
  font-weight: 500;
  color: var(--text);
}

.cell-salary {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--green);
}

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.badge-bonus-yes {
  background: rgba(0, 230, 118, 0.15);
  color: var(--green);
  border: 1px solid rgba(0, 230, 118, 0.3);
}
.badge-bonus-no {
  background: rgba(255, 71, 87, 0.12);
  color: var(--red);
  border: 1px solid rgba(255, 71, 87, 0.25);
}
.badge-bonus-unknown {
  background: rgba(107, 117, 145, 0.2);
  color: var(--text3);
  border: 1px solid var(--border);
}
.badge-weekly-毎週 {
  background: rgba(68, 138, 255, 0.15);
  color: var(--blue);
  border: 1px solid rgba(68, 138, 255, 0.3);
}
.badge-weekly-その他 {
  background: rgba(255, 145, 0, 0.12);
  color: var(--orange);
  border: 1px solid rgba(255, 145, 0, 0.25);
}
.badge-weekly-なし {
  background: rgba(255, 71, 87, 0.12);
  color: var(--red);
  border: 1px solid rgba(255, 71, 87, 0.25);
}

/* FOOTER */
#app-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--footer-h);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  z-index: 1000;
  padding: 0 20px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
}

.page-info {
  font-size: 11px;
  color: var(--text3);
  margin: 0 12px;
  white-space: nowrap;
  font-family: 'JetBrains Mono', monospace;
}

.btn-page {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 5px;
  padding: 5px 10px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  min-width: 32px;
  text-align: center;
  font-family: 'Noto Sans JP', sans-serif;
}
.btn-page:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0, 212, 255, 0.05);
}
.btn-page.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
  font-weight: 700;
}
.btn-page:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.page-jump {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: 8px;
}
.page-jump input {
  width: 52px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 5px;
  padding: 5px 8px;
  font-size: 12px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  outline: none;
}
.page-jump input:focus {
  border-color: var(--accent);
}
.page-jump label {
  font-size: 11px;
  color: var(--text3);
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent2); }
::-webkit-scrollbar-corner { background: var(--bg); }


/* VIEW TOGGLE BTN */
#view-toggle-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--surface);
  color: var(--text2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 7px 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}
#view-toggle-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,255,0.06);
}
#view-toggle-btn.card-active {
  background: linear-gradient(135deg, #2a1f4a 0%, #1e2a3a 100%);
  border-color: #9c6fff;
  color: #c8a8ff;
  box-shadow: 0 0 14px rgba(156,111,255,0.25);
}
#view-toggle-btn svg {
  width: 15px; height: 15px;
  flex-shrink: 0;
}

/* ===== CARD / 帳票 VIEW ===== */
#card-body {
  padding: 12px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.kyujin-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: box-shadow 0.2s, border-color 0.2s;
}
.kyujin-card:hover {
  border-color: var(--border2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* Card header band */
.card-head {
  background: linear-gradient(135deg, #14192a 0%, #1a2035 100%);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-no {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  background: rgba(0,212,255,0.1);
  border: 1px solid rgba(0,212,255,0.25);
  border-radius: 4px;
  padding: 2px 8px;
  white-space: nowrap;
  flex-shrink: 0;
}
.card-company {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.card-gyoshu-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
  background: rgba(0,212,255,0.1);
  color: var(--accent);
  border: 1px solid rgba(0,212,255,0.2);
}

/* Card grid rows */
.card-grid {
  display: table;
  width: 100%;
  border-collapse: collapse;
}
.card-row {
  display: table-row;
}
.card-row:not(:last-child) .card-label,
.card-row:not(:last-child) .card-value {
  border-bottom: 1px solid var(--border);
}
.card-label {
  display: table-cell;
  width: 100px;
  padding: 7px 10px 7px 14px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.5px;
  text-align: right;
  vertical-align: middle;
  white-space: nowrap;
  background: rgba(0,0,0,0.15);
}
.card-value {
  display: table-cell;
  padding: 7px 14px 7px 12px;
  font-size: 12px;
  color: var(--text2);
  vertical-align: middle;
}
.card-value.salary-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: var(--green);
}

/* Card footer */
.card-foot {
  background: rgba(0,0,0,0.1);
  border-top: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;

<script>
// =============================================
// CSV 読み込み & パース
// =============================================
function loadCsvFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    // 文字コード自動判定（Shift-JIS対応）
    const rawBytes = new Uint8Array(e.target.result);
    let text;
    try {
      // まず UTF-8 で試みる
      text = new TextDecoder('utf-8', { fatal: true }).decode(rawBytes);
    } catch {
      try {
        text = new TextDecoder('shift-jis').decode(rawBytes);
      } catch {
        text = new TextDecoder('utf-8').decode(rawBytes);
      }
    }
    parseCsvAndLoad(text);
    // オーバーレイを閉じる
    document.getElementById('csv-overlay').classList.add('hidden');
    // ヘッダーのファイル名表示を更新
    const btn = document.getElementById('csv-load-btn');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>${file.name}`;
  };
  reader.readAsArrayBuffer(file);
}

function parseCsvAndLoad(text) {
  // BOM除去
  text = text.replace(/^\uFEFF/, '');
  const lines = text.split(/\r\n|\r|\n/);
  if (lines.length < 2) return;

  // ヘッダー行のパース
  const headers = parseCsvLine(lines[0]);

  // HTMLの列キーとCSVヘッダーのマッピング
  // CSVのヘッダー名がHTMLの列キーと一致する前提。
  // 余分なスペースやBOMも吸収する。
  const colMapping = {
    '独自番号': ['独自番号', 'No', 'NO', '番号'],
    '安定所名': ['安定所名'],
    '求人番号': ['求人番号'],
    '事業所名': ['事業所名', '会社名'],
    '所在地': ['所在地', '住所'],
    '資本金': ['資本金'],
    '社員数数': ['社員数数', '社員数', '従業員数'],
    '就業場所人数': ['就業場所人数'],
    '求人数': ['求人数'],
    '就業場所': ['就業場所'],
    '月額賃金': ['月額賃金', '月給', '基本給'],
    '賞与': ['賞与', 'ボーナス'],
    '時間外平均': ['時間外平均', '残業時間'],
    '週休２日制': ['週休２日制', '週休2日制'],
    '年間休日数': ['年間休日数', '年間休日'],
    '業種8種': ['業種8種', '業種'],
    '産業分類': ['産業分類'],
    '職種': ['職種']
  };

  // CSVヘッダーからHTMLキーへの逆引きマップ作成
  const csvToKey = {};
  headers.forEach((h, i) => {
    const trimH = h.trim();
    for (const [key, aliases] of Object.entries(colMapping)) {
      if (aliases.includes(trimH)) {
        csvToKey[i] = key;
        break;
      }
    }
    // 完全一致もフォールバック
    if (!csvToKey[i]) csvToKey[i] = trimH;
  });

  // データ行パース
  ALL_DATA.length = 0;
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const vals = parseCsvLine(line);
    const row = {};
    headers.forEach((h, idx) => {
      const key = csvToKey[idx] || h.trim();
      row[key] = vals[idx] !== undefined ? vals[idx].trim() : '';
    });
    ALL_DATA.push(row);
  }

  // 業種8種・産業分類のselectを動的に更新
  updateSelectOptions('f-gyoshu', '業種8種');
  updateSelectOptions('f-sangyo', '産業分類');

  // 表示更新
  filteredData = [...ALL_DATA];
  currentPage = 1;
  sortAndRender();
  document.getElementById('total-count').textContent = ALL_DATA.length;
}

function parseCsvLine(line) {
  const result = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c === '"') {
        if (line[i + 1] === '"') { cur += '"'; i++; }
        else inQ = false;
      } else {
        cur += c;
      }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { result.push(cur); cur = ''; }
      else { cur += c; }
    }
  }
  result.push(cur);
  return result;
}

function updateSelectOptions(selectId, colKey) {
  const sel = document.getElementById(selectId);
  const vals = [...new Set(ALL_DATA.map(r => r[colKey]).filter(v => v && v.trim()))].sort();
  const cur = sel.value;
  sel.innerHTML = '<option value="">すべて</option>';
  vals.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    sel.appendChild(opt);
  });
  if (vals.includes(cur)) sel.value = cur;
}

// ドラッグ＆ドロップ対応
window.addEventListener('DOMContentLoaded', () => {
  const zone = document.getElementById('csv-drop-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.csv')) {
      const dt = new DataTransfer();
      dt.items.add(file);
      const input = document.getElementById('csv-file-input2');
      input.files = dt.files;
      loadCsvFile(input);
    }
  });
});

// =============================================
// 以下 元のスクリプト
// =============================================
const ALL_DATA = [];

const PAGE_SIZE = 50;
let filteredData = [...ALL_DATA];
let sortCol = '独自番号';
let sortDir = 1;
let currentPage = 1;
let totalPages = 1;
let searchOpen = false;

// Column widths (dynamic, resizable)
const colWidths = {
  '独自番号': 64, '安定所名': 130, '求人番号': 120, '事業所名': 180, '所在地': 130,
  '資本金': 110, '社員数数': 70, '就業場所人数': 80, '求人数': 62, '就業場所': 110,
  '月額賃金': 96, '賞与': 68, '時間外平均': 76, '週休２日制': 80, '年間休日数': 72,
  '業種8種': 130, '産業分類': 160, '職種': 180
};

const colKeys = ['独自番号','安定所名','求人番号','事業所名','所在地','資本金','社員数数','就業場所人数','求人数','就業場所','月額賃金','賞与','時間外平均','週休２日制','年間休日数','業種8種','産業分類','職種'];
const colJustify = {'月額賃金':'flex-end','独自番号':'center','社員数数':'center','就業場所人数':'center','求人数':'center','時間外平均':'center','週休２日制':'center','年間休日数':'center','賞与':'center'};

// Init
document.getElementById('total-count').textContent = ALL_DATA.length;
sortAndRender();
setupResizeHandles();
syncScroll();

function toggleSearch() {
  searchOpen = !searchOpen;
  const panel = document.getElementById('search-panel');
  const btn = document.getElementById('search-toggle-btn');
  if (searchOpen) {
    panel.classList.add('open');
    btn.classList.add('active');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>検索を閉じる`;
    updateSearchCount();
  } else {
    panel.classList.remove('open');
    btn.classList.remove('active');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>絞り込み検索`;
  }
  adjustMainTop();
}

function adjustMainTop() {
  const panelH = document.getElementById('search-panel').offsetHeight;
  const hdrH = 60;
  const total = hdrH + (searchOpen ? panelH : 0);
  document.getElementById('main').style.paddingTop = total + 'px';
  document.getElementById('table-wrap').style.height = `calc(100vh - ${total}px - 52px)`;
}

function applyFilter() {
  const kyunin = document.getElementById('f-kyunin').value.trim();
  const jigsho = document.getElementById('f-jigsho').value.trim().toLowerCase();
  const syozai = document.getElementById('f-syozai').value.trim().toLowerCase();
  const jgsho  = document.getElementById('f-jgsho').value.trim().toLowerCase();
  const shokushu = document.getElementById('f-shokushu').value.trim().toLowerCase();
  const gyoshu = document.getElementById('f-gyoshu').value;
  const sangyo = document.getElementById('f-sangyo').value;
  const nenkyuMin = document.getElementById('f-nenkyu-min').value;
  const nenkyuMax = document.getElementById('f-nenkyu-max').value;

  filteredData = ALL_DATA.filter(r => {
    if (kyunin && !String(r['求人番号']).startsWith(kyunin)) return false;
    if (jigsho && !String(r['事業所名']).toLowerCase().includes(jigsho)) return false;
    if (syozai && !String(r['所在地']).toLowerCase().includes(syozai)) return false;
    if (jgsho  && !String(r['就業場所']).toLowerCase().includes(jgsho)) return false;
    if (shokushu && !String(r['職種']).toLowerCase().includes(shokushu)) return false;
    if (gyoshu && r['業種8種'] !== gyoshu) return false;
    if (sangyo && r['産業分類'] !== sangyo) return false;
    const nk = parseInt(r['年間休日数']);
    if (nenkyuMin && (isNaN(nk) || nk < parseInt(nenkyuMin))) return false;
    if (nenkyuMax && (isNaN(nk) || nk > parseInt(nenkyuMax))) return false;
    return true;
  });

  updateSearchCount();
  currentPage = 1;
  sortAndRender();
}

function updateSearchCount() {
  document.getElementById('search-count').textContent = filteredData.length + ' 件';
}

function resetFilter() {
  ['f-kyunin','f-jigsho','f-syozai','f-jgsho','f-shokushu','f-nenkyu-min','f-nenkyu-max'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-gyoshu').value = '';
  document.getElementById('f-sangyo').value = '';
  filteredData = [...ALL_DATA];
  updateSearchCount();
  currentPage = 1;
  sortAndRender();
}

function sortAndRender() {
  filteredData.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (sortCol === '月額賃金' || sortCol === '年間休日数' || sortCol === '社員数数' || sortCol === '就業場所人数' || sortCol === '求人数' || sortCol === '時間外平均' || sortCol === '独自番号') {
      av = parseFloat(av) || 0;
      bv = parseFloat(bv) || 0;
    }
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });

  totalPages = Math.max(1, Math.ceil(filteredData.length / PAGE_SIZE));
  currentPage = Math.min(currentPage, totalPages);
  renderTable();
  renderPager();
  document.getElementById('total-count').textContent = ALL_DATA.length;
}

function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const rows = filteredData.slice(start, start + PAGE_SIZE);
  const body = document.getElementById('table-body');
  body.innerHTML = rows.map(r => buildRow(r)).join('');
}

function fmt(val) {
  return val === '' || val === null || val === undefined ? '—' : val;
}

function buildRow(r) {
  const salary = r['月額賃金'] ? Number(r['月額賃金']).toLocaleString() : '—';
  const bonus = r['賞与'];
  const weekly = r['週休２日制'];
  const bonusBadge = bonus === 'あり' ? `<span class="badge badge-bonus-yes">あり</span>`
    : bonus === 'なし' ? `<span class="badge badge-bonus-no">なし</span>`
    : `<span class="badge badge-bonus-unknown">—</span>`;
  const weeklyBadge = weekly === '毎週' ? `<span class="badge badge-weekly-毎週">毎週</span>`
    : weekly === 'なし' ? `<span class="badge badge-weekly-なし">なし</span>`
    : `<span class="badge badge-weekly-その他">その他</span>`;

  return `<div class="tr">
    <div class="col td c-no cell-no">${fmt(r['独自番号'])}</div>
    <div class="col td c-antei" title="${r['安定所名']}">${fmt(r['安定所名'])}</div>
    <div class="col td c-kyunin">${fmt(r['求人番号'])}</div>
    <div class="col td c-jigsho cell-jigsho" title="${r['事業所名']}">${fmt(r['事業所名'])}</div>
    <div class="col td c-syozai" title="${r['所在地']}">${fmt(r['所在地'])}</div>
    <div class="col td c-shihon" title="${r['資本金']}">${fmt(r['資本金'])}</div>
    <div class="col td c-shainsuu">${fmt(r['社員数数'])}</div>
    <div class="col td c-jgshnin">${fmt(r['就業場所人数'])}</div>
    <div class="col td c-kyuninsuu">${fmt(r['求人数'])}</div>
    <div class="col td c-jgsho" title="${r['就業場所']}">${fmt(r['就業場所'])}</div>
    <div class="col td c-salary cell-salary">${r['月額賃金'] ? salary + ' 円' : '—'}</div>
    <div class="col td c-bonus">${bonusBadge}</div>
    <div class="col td c-overtime">${fmt(r['時間外平均'])}${r['時間外平均'] ? 'h' : ''}</div>
    <div class="col td c-holiday">${weeklyBadge}</div>
    <div class="col td c-nenkyu">${fmt(r['年間休日数'])}${r['年間休日数'] ? '日' : ''}</div>
    <div class="col td c-gyoshu" title="${r['業種8種']}">${fmt(r['業種8種'])}</div>
    <div class="col td c-sangyo" title="${r['産業分類']}">${fmt(r['産業分類'])}</div>
    <div class="col td c-shokushu" title="${r['職種']}">${fmt(r['職種'])}</div>
  </div>`;
}

function renderPager() {
  const info = `${(currentPage - 1) * PAGE_SIZE + 1}–${Math.min(currentPage * PAGE_SIZE, filteredData.length)} / ${filteredData.length} 件 (P${currentPage}/${totalPages})`;
  document.getElementById('page-info').textContent = info;
  document.getElementById('page-input').value = currentPage;
  document.getElementById('page-input').max = totalPages;
  document.getElementById('btn-first').disabled = currentPage === 1;
  document.getElementById('btn-prev').disabled = currentPage === 1;
  document.getElementById('btn-next').disabled = currentPage === totalPages;
  document.getElementById('btn-last').disabled = currentPage === totalPages;

  // Page buttons (show up to 7 around current)
  const container = document.getElementById('page-btns');
  const btns = [];
  let s = Math.max(1, currentPage - 3);
  let e = Math.min(totalPages, s + 6);
  if (e - s < 6) s = Math.max(1, e - 6);
  for (let p = s; p <= e; p++) {
    btns.push(`<button class="btn-page${p === currentPage ? ' active' : ''}" onclick="goPage(${p})">${p}</button>`);
  }
  container.innerHTML = btns.join('');
}

function goPage(p) {
  p = Math.max(1, Math.min(totalPages, p));
  currentPage = p;
  renderTable();
  if (currentView === 'card') renderCards();
  renderPager();
  document.getElementById('table-body-wrap').scrollTop = 0;
  document.getElementById('card-body-wrap').scrollTop = 0;
}

// Sort on header click
document.querySelectorAll('.th[data-col]').forEach(th => {
  th.addEventListener('click', e => {
    if (e.target.classList.contains('resize-handle')) return;
    const col = th.dataset.col;
    if (sortCol === col) sortDir = -sortDir;
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('.th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
    th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    currentPage = 1;
    sortAndRender();
  });
});

// Initial sort indicator
document.querySelector('.th[data-col="独自番号"]').classList.add('sort-asc');

// Resize columns
function setupResizeHandles() {
  document.querySelectorAll('.resize-handle').forEach(handle => {
    let startX, startW, col;
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      e.stopPropagation();
      col = handle.closest('.th');
      startX = e.clientX;
      startW = col.offsetWidth;
      handle.classList.add('dragging');

      const move = ev => {
        const newW = Math.max(50, startW + ev.clientX - startX);
        const colKey = col.dataset.col;
        // Update all cells in this column
        const clsMap = {
          '独自番号':'c-no','安定所名':'c-antei','求人番号':'c-kyunin','事業所名':'c-jigsho',
          '所在地':'c-syozai','資本金':'c-shihon','社員数数':'c-shainsuu','就業場所人数':'c-jgshnin',
          '求人数':'c-kyuninsuu','就業場所':'c-jgsho','月額賃金':'c-salary','賞与':'c-bonus',
          '時間外平均':'c-overtime','週休２日制':'c-holiday','年間休日数':'c-nenkyu',
          '業種8種':'c-gyoshu','産業分類':'c-sangyo','職種':'c-shokushu'
        };
        const cls = clsMap[colKey];
        if (!cls) return;
        // Update stylesheet
        let styleEl = document.getElementById('dyn-col-style');
        if (!styleEl) {
          styleEl = document.createElement('style');
          styleEl.id = 'dyn-col-style';
          document.head.appendChild(styleEl);
        }
        colWidths[colKey] = newW;
        // Rebuild all col widths
        const rules = Object.entries(colWidths).map(([k, w]) => {
          const c = clsMap[k];
          return c ? `.${c} { width: ${w}px !important; }` : '';
        }).join('\n');
        styleEl.textContent = rules;
      };
      const up = () => {
        handle.classList.remove('dragging');
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
      };
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
    });
  });
}

// Sync scroll between header and body
function syncScroll() {
  const bodyWrap = document.getElementById('table-body-wrap');
  const headerWrap = document.getElementById('col-header-wrap');
  bodyWrap.addEventListener('scroll', () => {
    headerWrap.scrollLeft = bodyWrap.scrollLeft;
  });
}

document.querySelectorAll('#search-panel input[type="text"], #search-panel input[type="number"]').forEach(inp => {

// Live search count update
document.querySelectorAll('#search-panel input, #search-panel select').forEach(el => {

// ===== VIEW TOGGLE =====
let currentView = 'table'; // 'table' | 'card'

function toggleView() {
  currentView = currentView === 'table' ? 'card' : 'table';
  const btn = document.getElementById('view-toggle-btn');
  const tableWrap = document.getElementById('table-body-wrap');
  const colHdr = document.getElementById('col-header-wrap');
  const cardWrap = document.getElementById('card-body-wrap');
  const lbl = document.getElementById('vt-label');
  const iconCard = document.getElementById('vt-icon-card');
  const iconTable = document.getElementById('vt-icon-table');

  if (currentView === 'card') {
    btn.classList.add('card-active');
    lbl.textContent = '一覧';
    iconCard.style.display = 'none';
    iconTable.style.display = '';
    tableWrap.style.display = 'none';
    colHdr.style.display = 'none';
    cardWrap.style.display = 'block';
    renderCards();
  } else {
    btn.classList.remove('card-active');
    lbl.textContent = '帳票';
    iconCard.style.display = '';
    iconTable.style.display = 'none';
    tableWrap.style.display = '';
    colHdr.style.display = '';
    cardWrap.style.display = 'none';
  }
  adjustMainTop();
}

function renderCards() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const rows = filteredData.slice(start, start + PAGE_SIZE);
  const body = document.getElementById('card-body');
  body.innerHTML = rows.map(r => buildCard(r)).join('');
}

function buildCard(r) {
  const salary = r['月額賃金'] ? Number(r['月額賃金']).toLocaleString() + ' 円' : '—';
  const bonus = r['賞与'];
  const weekly = r['週休２日制'];
  const bonusBadge = bonus === 'あり' ? `<span class="badge badge-bonus-yes">あり</span>`
    : bonus === 'なし' ? `<span class="badge badge-bonus-no">なし</span>`
    : `<span class="badge badge-bonus-unknown">—</span>`;
  const weeklyBadge = weekly === '毎週' ? `<span class="badge badge-weekly-毎週">毎週</span>`
    : weekly === 'なし' ? `<span class="badge badge-weekly-なし">なし</span>`
    : `<span class="badge badge-weekly-その他">その他</span>`;

  const rows = [
    ['安定所名', fmt(r['安定所名'])],
    ['求人番号', `<span style="font-family:'JetBrains Mono',monospace;font-size:11px">${fmt(r['求人番号'])}</span>`],
    ['所在地', fmt(r['所在地'])],
    ['就業場所', fmt(r['就業場所'])],
    ['資本金', fmt(r['資本金'])],
    ['社員数', fmt(r['社員数数']) + (r['社員数数'] ? ' 名' : '')],
    ['就業場所人数', fmt(r['就業場所人数']) + (r['就業場所人数'] ? ' 名' : '')],
    ['求人数', fmt(r['求人数']) + (r['求人数'] ? ' 名' : '')],
    ['月額賃金', salary, 'salary-val'],
    ['賞与', bonusBadge],
    ['時間外平均', fmt(r['時間外平均']) + (r['時間外平均'] ? ' h/月' : '')],
    ['週休２日制', weeklyBadge],
    ['年間休日数', fmt(r['年間休日数']) + (r['年間休日数'] ? ' 日' : '')],
    ['業種8種', fmt(r['業種8種'])],
    ['産業分類', fmt(r['産業分類'])],
    ['職種', `<span style="font-weight:600;color:var(--text)">${fmt(r['職種'])}</span>`],
  ];

  const gridRows = rows.map(([label, value, cls]) =>
    `<div class="card-row">
      <div class="card-label">${label}</div>
      <div class="card-value${cls ? ' ' + cls : ''}">${value}</div>
    </div>`
  ).join('');

  return `<div class="kyujin-card">
    <div class="card-head">
      <span class="card-no">#${String(r['独自番号']).padStart(4,'0')}</span>
      <span class="card-company">${fmt(r['事業所名'])}</span>
      <span class="card-gyoshu-tag">${fmt(r['業種8種'])}</span>
    </div>
    <div class="card-grid">${gridRows}</div>
  </div>`;
}

// Patch renderTable to also update cards if in card view
const _origRenderTable = renderTable;
window.renderTable = function() {
  _origRenderTable();
  if (currentView === 'card') renderCards();
};

// Initial layout
adjustMainTop();
document.getElementById('table-wrap').style.height = `calc(100vh - 60px - 52px)`;
</script>
